<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #141e30, #243b55);
      min-height: 100vh;
      color: white;
    }

    .navbar {
      background: #000;
    }

    .card {
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .stat-card {
      text-align: center;
      padding: 25px;
      font-size: 20px;
      font-weight: bold;
    }

    .users { background: #0d6efd; }
    .courses { background: #198754; }
    .enrollments { background: #ffc107; color: black; }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar p-3">
  <div class="container-fluid">
    <span class="navbar-brand text-white fs-4 fw-bold">🚀 LMS Admin Dashboard</span>
  </div>
</nav>

<div class="container mt-5">

  <!-- STATS ROW -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card stat-card users shadow-lg">
        👥 Total Users
        <h2 id="totalUsers">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card courses shadow-lg">
        📚 Total Courses
        <h2 id="totalCourses">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card enrollments shadow-lg">
        🎓 Total Enrollments
        <h2 id="totalEnrollments">0</h2>
      </div>
    </div>
  </div>

  <!-- DATA TABLES -->
  <div class="row">

    <!-- Users -->
    <div class="col-md-6">
      <div class="card p-4 shadow-lg text-dark">
        <h4 class="text-primary">👥 Registered Users</h4>
        <ul id="userList" class="list-group mt-3"></ul>
      </div>
    </div>

    <!-- Enrollments -->
    <div class="col-md-6">
      <div class="card p-4 shadow-lg text-dark">
        <h4 class="text-success">🎓 Course Enrollments</h4>
        <ul id="enrollmentList" class="list-group mt-3"></ul>
      </div>
    </div>

  </div>

</div>

<script>

// LOAD STATS (NEW)
async function loadStats() {
  const response = await fetch("/admin/stats");
  const data = await response.json();

  document.getElementById("totalUsers").textContent = data.totalUsers || 0;
  document.getElementById("totalCourses").textContent = data.totalCourses || 0;
  document.getElementById("totalEnrollments").textContent = data.totalEnrollments || 0;
}

// Load Users
async function loadUsers() {
  const response = await fetch("/admin/users");
  const users = await response.json();

  const list = document.getElementById("userList");
  list.innerHTML = "";

  users.forEach(user => {
    const li = document.createElement("li");
    li.className = "list-group-item";
    li.textContent = user.email;
    list.appendChild(li);
  });
}

// Load Enrollments
async function loadEnrollments() {
  const response = await fetch("/admin/enrollments");
  const enrollments = await response.json();

  const list = document.getElementById("enrollmentList");
  list.innerHTML = "";

  enrollments.forEach(enroll => {
    const li = document.createElement("li");
    li.className = "list-group-item";
    li.innerHTML = `👤 ${enroll.email} <br> 📚 ${enroll.courseTitle}`;
    list.appendChild(li);
  });
}

// Load Everything
loadStats();
loadUsers();
loadEnrollments();

</script>

</body>
</html>
