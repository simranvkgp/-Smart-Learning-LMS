<!DOCTYPE html>
<html>
<head>
  <title>LMS Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.3);
      width: 100%;
      max-width: 450px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      font-size: 64px;
      margin-bottom: 15px;
      display: block;
    }

    .logo-title {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .logo-subtitle {
      font-size: 16px;
      color: #666;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1a1a1a;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      background: white;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      margin-top: 10px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .register-link {
      text-align: center;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #e0e0e0;
    }

    .register-link p {
      color: #666;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .register-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-block;
    }

    .register-link a:hover {
      color: #764ba2;
      transform: translateX(3px);
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #dc3545;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #28a745;
    }

    .success-message.show {
      display: block;
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-spinner.show {
      display: inline-block;
    }

    /* Responsive Design */
    @media (max-width: 480px) {
      .login-container {
        padding: 40px 30px;
        border-radius: 20px;
      }

      .logo-title {
        font-size: 28px;
      }

      .logo-icon {
        font-size: 48px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo-section">
    <span class="logo-icon">🎓</span>
    <h1 class="logo-title">LMS</h1>
    <p class="logo-subtitle">Learning Management System</p>
  </div>

  <div class="error-message" id="errorMessage"></div>
  <div class="success-message" id="successMessage"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">📧 Email Address</label>
      <input 
        type="email" 
        id="email" 
        placeholder="Enter your email" 
        required
        autocomplete="email"
      >
    </div>

    <div class="form-group">
      <label for="password">🔒 Password</label>
      <input 
        type="password" 
        id="password" 
        placeholder="Enter your password" 
        required
        autocomplete="current-password"
      >
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <span id="submitText">🚀 Login</span>
      <span class="loading-spinner" id="loadingSpinner"></span>
    </button>
  </form>

  <div class="register-link">
    <p>Don't have an account?</p>
    <a href="register.html">Create an account →</a>
  </div>
</div>

<script>
const loginForm = document.getElementById("loginForm");
const errorMessage = document.getElementById("errorMessage");
const successMessage = document.getElementById("successMessage");
const submitBtn = document.getElementById("submitBtn");
const submitText = document.getElementById("submitText");
const loadingSpinner = document.getElementById("loadingSpinner");

function showError(message) {
  errorMessage.textContent = message;
  errorMessage.classList.add("show");
  successMessage.classList.remove("show");
  setTimeout(() => {
    errorMessage.classList.remove("show");
  }, 5000);
}

function showSuccess(message) {
  successMessage.textContent = message;
  successMessage.classList.add("show");
  errorMessage.classList.remove("show");
}

function setLoading(loading) {
  if (loading) {
    submitBtn.disabled = true;
    submitText.style.display = "none";
    loadingSpinner.classList.add("show");
  } else {
    submitBtn.disabled = false;
    submitText.style.display = "inline";
    loadingSpinner.classList.remove("show");
  }
}

loginForm.addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showError("Please fill in all fields");
    return;
  }

  setLoading(true);

  try {
    const response = await fetch("/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    let data;
    try {
      data = await response.json();
    } catch (_) {
      setLoading(false);
      const text = await response.text();
      showError(response.ok ? "Invalid response from server." : "Server error: " + (response.status === 404 ? "API not found. Is the app deployed correctly?" : response.status + " " + (text || response.statusText)));
      return;
    }

    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("userRole", data.role);
      showSuccess("Login successful! Redirecting...");
      setTimeout(() => {
        if (data.role === "admin") {
          window.location.href = "admin-dashboard.html";
        } else if (data.role === "teacher") {
          window.location.href = "dashboard.html";
        } else {
          window.location.href = "student-dashboard.html";
        }
      }, 1000);
    } else {
      setLoading(false);
      showError(data.message || "Login failed. Please check your credentials.");
    }
  } catch (error) {
    setLoading(false);
    console.error("Login error:", error);
    showError("Network error. Check your connection and try again. " + (error.message || ""));
  }
});

// Clear messages when user starts typing
document.getElementById("email").addEventListener("input", () => {
  errorMessage.classList.remove("show");
  successMessage.classList.remove("show");
});

document.getElementById("password").addEventListener("input", () => {
  errorMessage.classList.remove("show");
  successMessage.classList.remove("show");
});
</script>

</body>
</html>
